<!DOCTYPE html>
<html>
<head>
    <title>AI Study Assistant</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>

        body{
            margin:0;
            font-family:'Poppins', sans-serif;
            background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
            color:white;
            padding:40px;
        }

        .container{
            width:750px;
            margin:auto;
            background: rgba(255,255,255,0.07);
            backdrop-filter: blur(15px);
            padding:30px;
            border-radius:15px;
            box-shadow: 0 0 25px rgba(0,200,255,0.2);
        }

        h1{
            text-align:center;
            color:#00eaff;
            text-shadow:0 0 10px #00eaff;
            margin-bottom:20px;
        }

        h3{
            color:#ffffff;
            margin-top:20px;
        }

        input[type=file]{
            width:100%;
            padding:10px;
            background:#0d1b2a;
            color:white;
            border-radius:8px;
            border:1px solid #00eaff;
        }

        textarea{
            width:100%;
            height:120px;
            padding:10px;
            border-radius:10px;
            border:none;
            outline:none;
            background:#0d1b2a;
            color:white;
            margin-top:10px;
        }

        /* 🔥 BUTTONS */
        button{
            padding:12px 20px;
            margin-top:10px;
            border:none;
            border-radius:10px;
            cursor:pointer;
            font-weight:bold;
            transition:0.3s;
            font-size:14px;
        }

        .btn-upload{
            background: linear-gradient(90deg,#00c6ff,#0072ff);
            color:white;
        }

        .btn-upload:hover{
            box-shadow:0 0 15px #00c6ff;
            transform:scale(1.05);
        }

        .btn-ask{
            background: linear-gradient(90deg,#7F00FF,#E100FF);
            color:white;
        }

        .btn-ask:hover{
            box-shadow:0 0 15px #E100FF;
            transform:scale(1.05);
        }

        .answer{
            margin-top:20px;
            padding:15px;
            background: rgba(0,255,255,0.1);
            border-left:5px solid #00eaff;
            border-radius:10px;
        }

        .msg{
            color:#00ffcc;
            margin-top:10px;
        }

        hr{
            border:0;
            height:1px;
            background:rgba(255,255,255,0.2);
            margin:20px 0;
        }

    </style>

</head>

<body>

<div class="container">

    <h1>📘 AI Study Assistant 🚀</h1>

    <!-- UPLOAD -->
    <h3>📂 Upload PDF</h3>

    <form action="/upload" method="POST" enctype="multipart/form-data">

        <input type="file" name="pdf" required>

        <button class="btn-upload">⬆ Upload PDF</button>

    </form>

    <p class="msg">{{message}}</p>

    <hr>

    <!-- ASK -->
    <h3>💬 Ask AI</h3>

    <form action="/ask" method="POST">

        <textarea name="question" placeholder="Ask your question..." required></textarea>

        <button class="btn-ask">🤖 Ask AI</button>

    </form>

    {% if answer %}
    <div class="answer">
        <h3>🧠 Answer</h3>
        <p>{{answer}}</p>
    </div>
    {% endif %}

</div>

</body>
</html>
