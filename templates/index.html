<!DOCTYPE html>
<html>
<head>
    <title>AI Study Assistant</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>

        body{
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            padding:40px;
            margin:0;
            color:white;
        }

        .container{
            width:750px;
            margin:auto;
            background: rgba(255,255,255,0.08);
            padding:30px;
            border-radius:15px;
            backdrop-filter: blur(12px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
        }

        h1{
            text-align:center;
            color:#00ffe7;
            font-size:32px;
            text-shadow:0 0 10px #00ffe7;
        }

        h3{
            color:#ffffff;
            margin-top:20px;
        }

        input[type=file]{
            margin:10px 0;
            padding:10px;
            background:white;
            border-radius:8px;
            width:100%;
        }

        textarea{
            width:100%;
            height:120px;
            border-radius:10px;
            padding:10px;
            border:none;
            outline:none;
            font-size:15px;
        }

        button{
            padding:12px 25px;
            margin-top:10px;
            cursor:pointer;
            border:none;
            border-radius:10px;
            font-weight:bold;
            background: linear-gradient(90deg, #00c6ff, #0072ff);
            color:white;
            transition:0.3s;
        }

        button:hover{
            transform:scale(1.05);
            box-shadow:0 0 15px #00c6ff;
        }

        .answer{
            margin-top:20px;
            background: rgba(0,255,200,0.1);
            padding:15px;
            border-radius:10px;
            border-left:5px solid #00ffe7;
        }

        p{
            color:#fff;
        }

        hr{
            border:0;
            height:1px;
            background:rgba(255,255,255,0.2);
            margin:20px 0;
        }

    </style>

</head>

<body>

<div class="container">

    <h1>📄 AI Study Assistant</h1>

    <h3>Upload PDF</h3>

    <form action="/upload" method="POST" enctype="multipart/form-data">

        <input type="file" name="pdf" required>

        <button type="submit">Upload PDF</button>

    </form>

    <p>{{message}}</p>

    <hr>

    <h3>Ask Question</h3>

    <form action="/ask" method="POST">

        <textarea name="question" placeholder="Ask your question..." required></textarea>

        <button type="submit">Ask AI 🚀</button>

    </form>

    {% if answer %}
    <div class="answer">
        <h3>Answer</h3>
        <p>{{answer}}</p>
    </div>
    {% endif %}

</div>

</body>
</html>
